name: Release macOS DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build and package macOS app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i '' "/^name = \"openstudio\"/{n;s/version = \".*\"/version = \"$VERSION\"/;}" Cargo.lock

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package app and DMG
        run: cargo packager --release

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenStudio-dmg
          path: target/release/*.dmg
          if-no-files-found: error

      - name: Publish DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/*.dmg
